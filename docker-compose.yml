services:
  postgres:
    image: postgres:17-alpine
    container_name: kivikova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kivikova
      POSTGRES_PASSWORD: kivikova_dev
      POSTGRES_DB: kivikova
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kivikova -d kivikova"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kivikova-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: kivikova-pgdata
  qdrant_data:
    name: kivikova-qdrant-data
