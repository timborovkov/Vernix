services:
  postgres:
    image: postgres:17-alpine
    container_name: vernix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vernix
      POSTGRES_PASSWORD: vernix_dev
      POSTGRES_DB: vernix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vernix -d vernix"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vernix-qdrant
    restart: unless-stopped
    ports:
      - "6380:6333"
      - "6381:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vernix-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: vernix
      MINIO_ROOT_PASSWORD: vernix_dev
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
    name: vernix-pgdata
  qdrant_data:
    name: vernix-qdrant-data
  minio_data:
    name: vernix-minio-data
