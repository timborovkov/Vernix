<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vernix Voice Agent</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #0a0a0a;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        overflow: hidden;
      }

      /* Ambient glow behind the logo */
      #glow {
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        background: #555;
        transition:
          background 1s ease,
          opacity 1s ease;
        pointer-events: none;
      }
      #glow.idle {
        background: #666;
        opacity: 0.1;
      }
      #glow.connecting {
        background: #eab308;
        opacity: 0.25;
        animation: glowPulse 1.5s ease-in-out infinite;
      }
      #glow.listening {
        background: #22c55e;
        opacity: 0.2;
      }
      #glow.thinking {
        background: #eab308;
        opacity: 0.25;
        animation: glowPulse 1.5s ease-in-out infinite;
      }
      #glow.speaking {
        background: #3b82f6;
        opacity: 0.3;
        animation: glowPulse 0.8s ease-in-out infinite;
      }
      #glow.cooldown {
        background: #22c55e;
        opacity: 0.1;
      }

      @keyframes glowPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.2;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.35;
        }
      }

      /* Logo container with ring */
      #logo-container {
        position: relative;
        margin-bottom: 24px;
      }
      #logo-ring {
        display: none;
      }

      #logo {
        width: 120px;
        height: 120px;
        opacity: 0.9;
        transition: opacity 0.3s;
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
      }
      #logo-container:hover #logo {
        opacity: 1;
      }

      /* Status text */
      #status {
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.02em;
        opacity: 0.7;
        margin-bottom: 6px;
        transition: opacity 0.3s;
      }

      /* Status dot — hidden, glow ring provides visual feedback */
      #indicator {
        display: none;
      }

      #log {
        position: absolute;
        bottom: 20px;
        font-size: 11px;
        opacity: 0.3;
        max-width: 600px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="glow"></div>
    <div id="logo-container">
      <div id="logo-ring"></div>
      <img id="logo" alt="Vernix" />
    </div>
    <div id="status">Initializing...</div>
    <div id="indicator"></div>
    <div id="log"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const meetingId = params.get("meetingId");
      const botSecret = params.get("botSecret");
      const appUrl = params.get("appUrl") || window.location.origin;

      const statusEl = document.getElementById("status");
      const indicatorEl = document.getElementById("indicator");
      const logEl = document.getElementById("log");
      const glowEl = document.getElementById("glow");
      const ringEl = document.getElementById("logo-ring");

      let ws = null;
      let audioContext = null;
      let audioDone = true;
      let mcpToolNames = new Set();
      let isMuted = false;
      let leaving = false;
      let sessionActive = false;
      let sessionStartedAt = 0;
      let pollInterval = null;
      let idleTimer = null;

      // --- Constants ---
      const POLL_INTERVAL_MS = 1000;
      const IDLE_TIMEOUT_MS = 15000;
      const AUDIO_BUFFER_SECONDS = 10;
      const FALLBACK_TIMEOUT_MS = 4000;
      const VAD_RMS_THRESHOLD = 0.015;
      const VAD_BUFFER_DURATION_MS = 800;
      const WAKE_DETECT_COOLDOWN_MS = 1500;
      let activating = false; // mutex to prevent dual activation
      let cachedToken = null;
      let cachedTokenExpiresAt = 0;
      let lastWakeDetectAt = 0;
      let vadBuffer = [];
      let vadBufferStartAt = 0;

      function setStatus(text, state) {
        statusEl.textContent = text;
        indicatorEl.className = state || "";
        glowEl.className = state || "";
        ringEl.className = state || "";
      }

      function log(msg) {
        logEl.textContent = msg;
        console.log("[VoiceAgent]", msg);
      }

      // --- Audio playback ---
      const audioQueue = [];
      let isPlaying = false;

      function queueAudio(base64Pcm) {
        try {
          audioDone = false;
          const binary = atob(base64Pcm);
          if (binary.length === 0) return;
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++)
            bytes[i] = binary.charCodeAt(i);
          const int16 = new Int16Array(bytes.buffer);

          const float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

          audioQueue.push(float32);
          if (!isPlaying) playNext();
        } catch (e) {
          console.warn("[VoiceAgent] Audio decode error:", e);
        }
      }

      function playNext() {
        if (!audioContext || audioQueue.length === 0) {
          isPlaying = false;
          if (audioDone && sessionActive) {
            setStatus("Listening...", "listening");
            startIdleTimer();
          }
          return;
        }
        isPlaying = true;
        setStatus("Speaking...", "speaking");
        clearIdleTimer();

        const samples = audioQueue.shift();
        const buffer = audioContext.createBuffer(1, samples.length, 24000);
        buffer.getChannelData(0).set(samples);

        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);
        source.onended = playNext;
        source.start();
      }

      // --- Circular audio buffer ---
      const CHUNK_SIZE = 4096; // ScriptProcessor fallback chunk size
      const MAX_RING_SAMPLES = AUDIO_BUFFER_SECONDS * 24000;
      const audioRingBuffer = [];
      let ringBufferSamples = 0;

      function pushToRingBuffer(base64Chunk, sampleCount) {
        audioRingBuffer.push({ data: base64Chunk, samples: sampleCount });
        ringBufferSamples += sampleCount;
        while (
          ringBufferSamples > MAX_RING_SAMPLES &&
          audioRingBuffer.length > 1
        ) {
          const removed = audioRingBuffer.shift();
          ringBufferSamples -= removed.samples;
        }
      }

      function flushRingBuffer() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        for (const entry of audioRingBuffer) {
          ws.send(
            JSON.stringify({
              type: "input_audio_buffer.append",
              audio: entry.data,
            })
          );
        }
        audioRingBuffer.length = 0;
        ringBufferSamples = 0;
      }

      // --- WAV encoding for wake-detect ---
      function encodeWav(int16Samples, sampleRate) {
        const dataLen = int16Samples.length * 2;
        const buffer = new ArrayBuffer(44 + dataLen);
        const view = new DataView(buffer);
        // RIFF header
        view.setUint32(0, 0x52494646, false); // "RIFF"
        view.setUint32(4, 36 + dataLen, true);
        view.setUint32(8, 0x57415645, false); // "WAVE"
        // fmt chunk
        view.setUint32(12, 0x666d7420, false); // "fmt "
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM
        view.setUint16(22, 1, true); // mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true); // byte rate
        view.setUint16(32, 2, true); // block align
        view.setUint16(34, 16, true); // bits per sample
        // data chunk
        view.setUint32(36, 0x64617461, false); // "data"
        view.setUint32(40, dataLen, true);
        for (let i = 0; i < int16Samples.length; i++) {
          view.setInt16(44 + i * 2, int16Samples[i], true);
        }
        return new Uint8Array(buffer);
      }

      // --- Wake-word detection via server ---
      async function sendWakeDetect(int16Samples) {
        if (sessionActive || activating || leaving || isMuted) return;
        const now = Date.now();
        if (now - lastWakeDetectAt < WAKE_DETECT_COOLDOWN_MS) return;
        lastWakeDetectAt = now;

        // Downsample 24kHz → 16kHz (take every 1.5th sample via linear interp)
        const ratio = 24000 / 16000;
        const outLen = Math.floor(int16Samples.length / ratio);
        const downsampled = new Int16Array(outLen);
        for (let i = 0; i < outLen; i++) {
          const srcIdx = i * ratio;
          const idx = Math.floor(srcIdx);
          const frac = srcIdx - idx;
          const a = int16Samples[idx] || 0;
          const b =
            int16Samples[Math.min(idx + 1, int16Samples.length - 1)] || 0;
          downsampled[i] = Math.round(a + frac * (b - a));
        }

        const wav = encodeWav(downsampled, 16000);
        let binary = "";
        for (let i = 0; i < wav.length; i++)
          binary += String.fromCharCode(wav[i]);
        const base64Audio = btoa(binary);

        try {
          const res = await fetch(`${appUrl}/api/agent/wake-detect`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              meetingId,
              botSecret,
              audio: base64Audio,
            }),
          });
          if (!res.ok) return;
          const data = await res.json();
          if (data.activated && !sessionActive && !activating) {
            log("Wake word detected — activating");
            activating = true;
            stopPolling();
            activateSession(data.transcriptWindow);
          }
        } catch {
          /* best effort — polling fallback handles it */
        }
      }

      // --- Audio capture (ScriptProcessor + VAD) ---
      async function startCapture() {
        const micTimeout = new Promise((_, reject) =>
          setTimeout(() => reject(new Error("Microphone timeout")), 5000)
        );
        const stream = await Promise.race([
          navigator.mediaDevices.getUserMedia({ audio: true }),
          micTimeout,
        ]);
        audioContext = new AudioContext({ sampleRate: 24000 });

        const source = audioContext.createMediaStreamSource(stream);
        const processor = audioContext.createScriptProcessor(CHUNK_SIZE, 1, 1);

        processor.onaudioprocess = (e) => {
          const float32 = e.inputBuffer.getChannelData(0);
          const int16 = new Int16Array(float32.length);
          let sum = 0;
          for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            int16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
            sum += float32[i] * float32[i];
          }
          const rms = Math.sqrt(sum / float32.length);
          handleAudioFrame(int16, rms > VAD_RMS_THRESHOLD);
        };

        source.connect(processor);
        const silentGain = audioContext.createGain();
        silentGain.gain.value = 0;
        processor.connect(silentGain);
        silentGain.connect(audioContext.destination);
      }

      // --- Handle each audio frame (from worklet or ScriptProcessor) ---
      function handleAudioFrame(int16Samples, speechDetected) {
        // Encode to base64 for ring buffer
        const bytes = new Uint8Array(int16Samples.buffer);
        let binary = "";
        for (let i = 0; i < bytes.length; i++)
          binary += String.fromCharCode(bytes[i]);
        const base64 = btoa(binary);

        // Always buffer for context on activation
        pushToRingBuffer(base64, int16Samples.length);

        // Stream live audio when session is active
        if (ws && ws.readyState === WebSocket.OPEN && sessionActive) {
          ws.send(
            JSON.stringify({
              type: "input_audio_buffer.append",
              audio: base64,
            })
          );
        }

        // VAD: accumulate speech for wake-word detection
        if (!sessionActive && !leaving && !isMuted && speechDetected) {
          if (vadBuffer.length === 0) {
            vadBufferStartAt = Date.now();
          }
          vadBuffer.push(int16Samples);

          // Once we have enough speech, send for transcription
          const elapsed = Date.now() - vadBufferStartAt;
          if (elapsed >= VAD_BUFFER_DURATION_MS) {
            // Concatenate all buffered int16 chunks
            const totalLen = vadBuffer.reduce((s, c) => s + c.length, 0);
            const combined = new Int16Array(totalLen);
            let offset = 0;
            for (const chunk of vadBuffer) {
              combined.set(chunk, offset);
              offset += chunk.length;
            }
            vadBuffer = [];
            vadBufferStartAt = 0;
            sendWakeDetect(combined);
          }
        } else if (!speechDetected && vadBuffer.length > 0) {
          // Speech ended before buffer was full — still send if we have >0.5s
          const elapsed = Date.now() - vadBufferStartAt;
          if (elapsed > 500) {
            const totalLen = vadBuffer.reduce((s, c) => s + c.length, 0);
            const combined = new Int16Array(totalLen);
            let offset = 0;
            for (const chunk of vadBuffer) {
              combined.set(chunk, offset);
              offset += chunk.length;
            }
            vadBuffer = [];
            vadBufferStartAt = 0;
            sendWakeDetect(combined);
          } else {
            // Too short — discard
            vadBuffer = [];
            vadBufferStartAt = 0;
          }
        }
      }

      // --- Idle timer ---
      function startIdleTimer() {
        clearIdleTimer();
        idleTimer = setTimeout(() => {
          log("Idle timeout — closing session");
          closeSession("idle");
        }, IDLE_TIMEOUT_MS);
      }

      function clearIdleTimer() {
        if (idleTimer) {
          clearTimeout(idleTimer);
          idleTimer = null;
        }
      }

      // --- Session lifecycle ---
      function closeSession(reason) {
        clearIdleTimer();
        sessionActive = false;
        activating = false;
        if (ws) {
          ws.onclose = null;
          ws.close();
          ws = null;
        }
        audioQueue.length = 0;
        isPlaying = false;
        vadBuffer = [];
        vadBufferStartAt = 0;
        audioDone = true;

        // Notify server with session duration for telemetry
        const sessionDurationMs =
          sessionStartedAt > 0 ? Date.now() - sessionStartedAt : 0;
        sessionStartedAt = 0;
        notifyState("idle", { sessionDurationMs });

        if (!leaving) {
          // Always restart polling so we can detect unmute from host.
          // pollActivation() already checks isMuted and skips activation.
          if (isMuted) {
            setStatus("Muted", "");
          } else {
            setStatus('Say "Vernix", "Agent", or "Assistant"', "idle");
            prefetchToken(); // pre-fetch for next activation
          }
          startPolling();
        }

        log("Session closed: " + reason);
      }

      // --- Pre-generated acknowledgement audio ---
      // Short "one moment" beep — three ascending tones
      function playAcknowledgement() {
        if (!audioContext) return;
        const duration = 0.15;
        const frequencies = [440, 554, 659];
        frequencies.forEach((freq, i) => {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.frequency.value = freq;
          osc.type = "sine";
          gain.gain.value = 0.15;
          gain.gain.setValueAtTime(0.15, audioContext.currentTime + i * 0.18);
          gain.gain.exponentialRampToValueAtTime(
            0.001,
            audioContext.currentTime + i * 0.18 + duration
          );
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.start(audioContext.currentTime + i * 0.18);
          osc.stop(audioContext.currentTime + i * 0.18 + duration);
        });
      }

      // --- Agent action helpers ---
      async function agentLeave() {
        if (leaving) return;
        leaving = true;
        try {
          await fetch(`${appUrl}/api/agent/leave`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ meetingId, botSecret }),
          });
        } catch (err) {
          log("Leave error: " + err.message);
        }
        closeSession("leaving");
        stopPolling();
        setStatus("Left meeting", "");
      }

      async function agentSwitchToSilent() {
        if (leaving) return;
        leaving = true;
        try {
          await fetch(`${appUrl}/api/agent/switch-mode`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ meetingId, botSecret }),
          });
        } catch (err) {
          log("Switch mode error: " + err.message);
        }
        closeSession("switch-to-silent");
        stopPolling();
        setStatus("Silent mode active", "");
      }

      // --- Tool handlers ---
      async function handleToolCall(callId, name, args) {
        if (name === "leave_meeting") {
          setStatus("Leaving meeting...", "thinking");
          sendToolOutput(callId, "I'll leave the meeting now. Goodbye!");
          setTimeout(agentLeave, 3000);
          return;
        }

        if (name === "switch_to_silent") {
          setStatus("Switching to silent mode...", "thinking");
          sendToolOutput(
            callId,
            "Switching to silent mode. I'll respond via text chat from now on."
          );
          setTimeout(agentSwitchToSilent, 3000);
          return;
        }

        if (name === "mute_self") {
          setStatus("Muting...", "thinking");
          sendToolOutput(
            callId,
            "I'll be quiet now. The host can unmute me from the dashboard."
          );
          setTimeout(async () => {
            if (leaving) return;
            try {
              await fetch(`${appUrl}/api/agent/mute-self`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ meetingId, botSecret }),
              });
            } catch (err) {
              log("Mute error: " + err.message);
            }
            isMuted = true;
            closeSession("muted");
            setStatus("Muted", "");
          }, 3000);
          return;
        }

        if (name === "search_meeting_context") {
          setStatus("Searching context...", "thinking");
          try {
            const res = await fetch(`${appUrl}/api/agent/rag`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                meetingId,
                botSecret,
                query: args.query,
              }),
            });
            const data = await res.json();
            sendToolOutput(callId, data.context || "No context found.");
          } catch (err) {
            log("RAG error: " + err.message);
            sendToolOutput(callId, "Error searching context.");
          }
          return;
        }

        if (mcpToolNames.has(name)) {
          const displayName =
            name.split("__").slice(2).join("__").replace(/_/g, " ") || name;
          setStatus(`Using ${displayName}...`, "thinking");
          try {
            const res = await fetch(`${appUrl}/api/agent/mcp-tool`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                meetingId,
                botSecret,
                toolName: name,
                arguments: args,
              }),
            });
            const data = await res.json();
            const output =
              data.result != null
                ? typeof data.result === "string"
                  ? data.result
                  : JSON.stringify(data.result)
                : data.error || "Tool returned no result.";
            sendToolOutput(callId, output);
          } catch (err) {
            log("MCP tool error: " + err.message);
            sendToolOutput(callId, "Error calling tool: " + name);
          }
          return;
        }

        sendToolOutput(callId, "Unknown tool.");
      }

      function sendToolOutput(callId, output) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(
          JSON.stringify({
            type: "conversation.item.create",
            item: {
              type: "function_call_output",
              call_id: callId,
              output: output,
            },
          })
        );
        ws.send(JSON.stringify({ type: "response.create" }));
      }

      // --- Server state notifications ---
      async function notifyState(state, extra) {
        try {
          await fetch(`${appUrl}/api/agent/activation-status`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ meetingId, botSecret, state, ...extra }),
          });
        } catch {
          /* best effort */
        }
      }

      // --- Activation polling ---
      function startPolling() {
        stopPolling();
        pollInterval = setInterval(pollActivation, POLL_INTERVAL_MS);
      }

      function stopPolling() {
        if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
        }
      }

      async function pollActivation() {
        if (leaving || sessionActive) return;
        try {
          const res = await fetch(`${appUrl}/api/agent/activation-status`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ meetingId, botSecret }),
          });
          if (!res.ok) return;
          const data = await res.json();

          // Handle mute state
          if (data.muted && !isMuted) {
            isMuted = true;
            setStatus("Muted by host", "");
            return;
          }
          if (!data.muted && isMuted) {
            isMuted = false;
            leaving = false;
            setStatus('Say "Vernix", "Agent", or "Assistant"', "idle");
          }

          if (isMuted) return;

          // Handle activation
          if (data.state === "activated" && !sessionActive && !activating) {
            activating = true;
            stopPolling();
            activateSession(data.transcriptWindow);
          }
        } catch {
          /* ignore polling errors */
        }
      }

      // --- Token pre-fetch ---
      async function prefetchToken() {
        try {
          const res = await fetch(
            `${appUrl}/api/agent/voice-token?meetingId=${meetingId}&botSecret=${botSecret}`
          );
          if (!res.ok) return;
          const data = await res.json();
          cachedToken = data.token;
          cachedTokenExpiresAt = (data.expiresAt || 0) * 1000; // convert to ms
          mcpToolNames = new Set(data.mcpToolNames || []);
          log("Token pre-fetched");
        } catch {
          /* best effort */
        }
      }

      function getCachedToken() {
        // Use cached token if it expires more than 30s from now
        if (cachedToken && cachedTokenExpiresAt > Date.now() + 30000) {
          const token = cachedToken;
          cachedToken = null; // consume it — each token is single-use
          return token;
        }
        return null;
      }

      // --- On-demand Realtime session ---
      async function activateSession(transcriptWindow) {
        sessionActive = true;
        activating = false;
        sessionStartedAt = Date.now();
        vadBuffer = [];
        vadBufferStartAt = 0;
        let fallbackFired = false;
        playAcknowledgement();
        setStatus("Connecting...", "connecting");
        notifyState("responding");

        // Set a fallback timeout
        const fallbackTimer = setTimeout(() => {
          if (!ws || ws.readyState !== WebSocket.OPEN) {
            log("Realtime connection timed out, falling back to chat");
            fallbackFired = true;
            triggerFallback(transcriptWindow);
          }
        }, FALLBACK_TIMEOUT_MS);

        // Try cached token first, fetch fresh one if needed
        let token = getCachedToken();
        if (!token) {
          let tokenRes;
          try {
            tokenRes = await fetch(
              `${appUrl}/api/agent/voice-token?meetingId=${meetingId}&botSecret=${botSecret}`
            );
          } catch (err) {
            clearTimeout(fallbackTimer);
            if (fallbackFired) return;
            log("Token fetch failed: " + err.message);
            triggerFallback(transcriptWindow);
            return;
          }

          if (fallbackFired) return;

          if (!tokenRes.ok) {
            clearTimeout(fallbackTimer);
            log("Token error: " + tokenRes.status);
            triggerFallback(transcriptWindow);
            return;
          }

          const tokenData = await tokenRes.json();
          token = tokenData.token;
          mcpToolNames = new Set(tokenData.mcpToolNames || []);

          if (fallbackFired) return;
        }

        // Token ready — cancel the fallback timer.
        clearTimeout(fallbackTimer);

        const url = "wss://api.openai.com/v1/realtime?model=gpt-realtime-1.5";
        ws = new WebSocket(url, [
          "realtime",
          `openai-insecure-api-key.${token}`,
        ]);

        ws.onopen = () => {
          log("WebSocket connected");
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);

          switch (msg.type) {
            case "session.created":
              setStatus("Listening...", "listening");
              log("Session ready");

              // Inject transcript window as context (only on initial creation)
              if (transcriptWindow) {
                ws.send(
                  JSON.stringify({
                    type: "conversation.item.create",
                    item: {
                      type: "message",
                      role: "user",
                      content: [
                        {
                          type: "input_text",
                          text:
                            "Here is the recent meeting transcript. Someone just addressed you — listen to the audio to hear their question and respond.\n\n" +
                            transcriptWindow,
                        },
                      ],
                    },
                  })
                );
              }

              // Flush buffered audio so the model hears the full question
              flushRingBuffer();

              // Trigger a response to the wake-word question
              ws.send(JSON.stringify({ type: "response.create" }));
              break;

            case "session.updated":
              setStatus("Listening...", "listening");
              break;

            case "response.output_audio.delta":
              clearIdleTimer();
              queueAudio(msg.delta);
              break;

            case "response.output_audio.done":
              audioDone = true;
              if (!isPlaying) {
                setStatus("Listening...", "listening");
                startIdleTimer();
              }
              break;

            case "response.function_call_arguments.done":
              clearIdleTimer();
              try {
                const args = JSON.parse(msg.arguments);
                handleToolCall(msg.call_id, msg.name, args);
              } catch (err) {
                log("Tool parse error: " + err.message);
              }
              break;

            case "input_audio_buffer.speech_started":
              // Barge-in: stop playing and cancel idle timer (follow-up question)
              audioQueue.length = 0;
              isPlaying = false;
              audioDone = true;
              clearIdleTimer();
              setStatus("Hearing speech...", "listening");
              break;

            case "input_audio_buffer.speech_stopped":
              setStatus("Processing...", "thinking");
              break;

            case "error":
              log("Error: " + (msg.error?.message || JSON.stringify(msg)));
              break;
          }
        };

        ws.onerror = (err) => {
          log("WebSocket error");
          console.error(err);
        };

        ws.onclose = () => {
          // Do NOT auto-reconnect — return to polling
          if (sessionActive) {
            closeSession("ws-closed");
          }
        };
      }

      // --- Fallback to chat ---
      async function triggerFallback(transcriptWindow) {
        log("Falling back to chat response...");
        // Close WebSocket immediately but keep sessionActive true
        // to prevent polling from triggering a duplicate activation
        if (ws) {
          ws.onclose = null;
          ws.close();
          ws = null;
        }
        setStatus("Thinking...", "thinking");

        try {
          await fetch(`${appUrl}/api/agent/voice-fallback`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ meetingId, botSecret, transcriptWindow }),
          });
          log("Fallback chat response sent");
        } catch (err) {
          log("Fallback error: " + err.message);
        }

        // Reset state only after fallback completes.
        // Compute session duration before resetting timestamp (same as closeSession).
        const sessionDurationMs =
          sessionStartedAt > 0 ? Date.now() - sessionStartedAt : 0;
        sessionActive = false;
        activating = false;
        sessionStartedAt = 0;
        notifyState("idle", { sessionDurationMs });
        setStatus('Say "Vernix", "Agent", or "Assistant"', "idle");
        startPolling();
      }

      // --- Init ---
      async function init() {
        if (!meetingId || !botSecret) {
          // Don't reveal anything to random visitors
          document.body.innerHTML = "";
          return;
        }

        document.getElementById("logo").src =
          appUrl + "/brand/icon/icon-dark-256.png";

        try {
          log("Starting audio capture...");
          await startCapture();
          log("Audio capture ready");
        } catch (err) {
          log("Audio capture failed: " + err.message);
          console.error(err);
        }

        setStatus('Say "Vernix", "Agent", or "Assistant"', "idle");
        prefetchToken();
        startPolling();
      }

      init();
    </script>
  </body>
</html>
